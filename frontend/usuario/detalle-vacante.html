<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Detalle de Vacante - TrabajoSV</title>
    <style>
        body { background: #f8f9fc; }
        .hero-vacante {
            background: linear-gradient(135deg, #2e3266, #4a51b5);
            padding: 40px 0 70px;
        }
        .card-wrapper { margin-top: -48px; }
        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 20px;
            background: #f3f4f6;
            color: #374151;
        }
        .info-card {
            background:#fff;
            border-radius:14px;
            box-shadow:0 2px 8px rgba(0,0,0,.07);
            padding: 28px;
        }
        #vac-descripcion { white-space: pre-wrap; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav id="nav-website" class="navbar navbar-expand-lg"></nav>

    <!-- Hero / Cabecera -->
    <div class="hero-vacante">
        <div class="container">
            <a href="/website/empleos.html" class="text-white-50 small text-decoration-none mb-3 d-inline-block">
                <i class="bi bi-arrow-left me-1"></i>Volver a empleos
            </a>
            <h3 class="text-white fw-bold mb-1" id="vac-titulo">Cargando...</h3>
            <p class="text-white-50 mb-0">
                <i class="bi bi-building me-1"></i><span id="vac-empresa"></span>
                &nbsp;·&nbsp;
                <i class="bi bi-geo-alt me-1"></i><span id="vac-ubicacion"></span>
            </p>
        </div>
    </div>

    <div class="container card-wrapper flex-grow-1 pb-5">
        <div class="row g-4">

            <!-- Detalles principales -->
            <div class="col-lg-8">
                <div class="info-card">
                    <!-- Meta chips -->
                    <div id="vac-chips" class="d-flex flex-wrap gap-2 mb-4"></div>

                    <!-- Descripción -->
                    <h6 class="fw-bold mb-2" style="color:#1a1d2e;">Descripción del puesto</h6>
                    <p id="vac-descripcion" class="text-muted small mb-0">Cargando descripción...</p>
                </div>
            </div>

            <!-- Sidebar de acción -->
            <div class="col-lg-4">
                <div class="info-card position-sticky" style="top:80px;">
                    <h6 class="fw-bold mb-3" style="color:#1a1d2e;">Postúlate a este trabajo</h6>

                    <div class="mb-3 text-center">
                        <div class="rounded-3 d-inline-flex align-items-center justify-content-center"
                             style="width:60px;height:60px;background:#eef2ff;">
                            <i class="bi bi-buildings" style="color:#2e3266;font-size:1.6rem;"></i>
                        </div>
                        <p class="fw-semibold mt-2 mb-0 small" id="vac-empresa-sidebar"></p>
                    </div>

                    <div id="vac-salario-wrap" class="mb-3 d-none">
                        <p class="text-muted small mb-1">Salario</p>
                        <p class="fw-bold mb-0" id="vac-salario"></p>
                    </div>

                    <div class="mb-3">
                        <p class="text-muted small mb-1">Tipo de contrato</p>
                        <p class="fw-semibold mb-0" id="vac-tipo"></p>
                    </div>

                    <div class="mb-3">
                        <p class="text-muted small mb-1">Nivel de experiencia</p>
                        <p class="fw-semibold mb-0" id="vac-nivel"></p>
                    </div>

                    <div id="vac-fecha-cierre-wrap" class="mb-4 d-none">
                        <p class="text-muted small mb-1">Cierre de postulaciones</p>
                        <p class="fw-semibold mb-0" id="vac-fecha-cierre"></p>
                    </div>

                    <button id="btn-postular"
                        class="btn btn-warning w-100 fw-semibold rounded-pill py-2"
                        data-bs-toggle="modal" data-bs-target="#modalPostular">
                        <i class="bi bi-send-fill me-1"></i>Postularme
                    </button>
                </div>
            </div>

        </div>
    </div>

    <footer id="footer-website" class="mt-3"></footer>

    <!-- Modal de Postulación -->
    <div class="modal fade" id="modalPostular" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="fw-bold mb-0">Enviar Postulación</h5>
                        <small class="text-muted" id="modal-vacante-nombre"></small>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="modal-feedback"></div>
                    <label class="form-label small fw-semibold">
                        Carta de presentación <span class="text-muted fw-normal">(opcional)</span>
                    </label>
                    <textarea id="carta-presentacion" class="form-control" rows="5"
                        placeholder="Cuéntale al empleador por qué eres el candidato ideal para este puesto..."></textarea>
                    <p class="text-muted small mt-2 mb-3">
                        <i class="bi bi-info-circle me-1"></i>
                        Se adjuntará el CV que tienes guardado en tu perfil.
                    </p>
                    <button id="btn-enviar-postulacion"
                        class="btn w-100 fw-semibold rounded-pill py-2"
                        style="background:#2e3266;color:#fff;">
                        <i class="bi bi-send-fill me-1"></i>Enviar Postulación
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/app.js"></script>
    <script>
        const idVacante = new URLSearchParams(window.location.search).get('id');

        if (!idVacante) {
            document.getElementById('vac-titulo').textContent = 'Vacante no encontrada';
        } else {
            cargarVacante(idVacante);
        }

        async function cargarVacante(id) {
            try {
                const res  = await fetch('/api/vacantes/' + id, { credentials: 'include' });
                const data = await res.json();

                if (!data.ok) {
                    document.getElementById('vac-titulo').textContent = 'Vacante no encontrada';
                    return;
                }

                const vacante    = data.vacante;
                const yaPostulado = data.yaPostulado;

                document.getElementById('vac-titulo').textContent    = vacante.titulo;
                document.getElementById('vac-empresa').textContent   = vacante.nombre_empresa || '';
                document.getElementById('vac-ubicacion').textContent = vacante.ubicacion || '';
                document.getElementById('vac-empresa-sidebar').textContent = vacante.nombre_empresa || '';
                document.title = vacante.titulo + ' - TrabajoSV';

                const fmt = (s) => s ? s.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : '';
                const tipo  = fmt(vacante.tipo_contrato);
                const nivel = fmt(vacante.nivel_experiencia);

                document.getElementById('vac-chips').innerHTML = `
                    <span class="meta-chip"><i class="bi bi-geo-alt-fill text-danger"></i> ${vacante.ubicacion || 'El Salvador'}</span>
                    <span class="meta-chip"><i class="bi bi-clock-fill" style="color:#2e3266;"></i> ${tipo}</span>
                    <span class="meta-chip"><i class="bi bi-bar-chart-fill" style="color:#059669;"></i> ${nivel}</span>
                    ${vacante.salario_min ? '<span class="meta-chip"><i class="bi bi-cash-coin text-warning"></i> $' + vacante.salario_min + (vacante.salario_max ? ' - $' + vacante.salario_max : '') + '</span>' : ''}
                `;

                document.getElementById('vac-tipo').textContent  = tipo  || '—';
                document.getElementById('vac-nivel').textContent = nivel || '—';

                if (vacante.salario_min) {
                    const sal = '$' + vacante.salario_min + (vacante.salario_max ? ' - $' + vacante.salario_max : '');
                    document.getElementById('vac-salario').textContent = sal;
                    document.getElementById('vac-salario-wrap').classList.remove('d-none');
                }

                if (vacante.fecha_cierre) {
                    const fecha = new Date(vacante.fecha_cierre).toLocaleDateString('es-SV', { year:'numeric', month:'long', day:'numeric' });
                    document.getElementById('vac-fecha-cierre').textContent = fecha;
                    document.getElementById('vac-fecha-cierre-wrap').classList.remove('d-none');
                }

                document.getElementById('vac-descripcion').textContent = vacante.descripcion || 'Sin descripción.';
                document.getElementById('modal-vacante-nombre').textContent = vacante.titulo;

                // Estado del botón según sesión y si ya postuló
                const sessionRes = await fetch('/api/auth/check-session', { credentials: 'include' });
                const session    = await sessionRes.json();
                const btnPostular = document.getElementById('btn-postular');

                if (!session.logged) {
                    btnPostular.removeAttribute('data-bs-toggle');
                    btnPostular.removeAttribute('data-bs-target');
                    btnPostular.addEventListener('click', () => {
                        window.location.href = '/usuario/usuario-login.html?redirect=' + encodeURIComponent(window.location.href);
                    });
                } else if (session.user.rol !== 'candidato') {
                    btnPostular.disabled = true;
                    btnPostular.textContent = 'Solo candidatos pueden postular';
                    btnPostular.classList.replace('btn-warning', 'btn-secondary');
                } else if (yaPostulado) {
                    btnPostular.disabled = true;
                    btnPostular.innerHTML = '<i class="bi bi-check-circle me-1"></i>Ya postulado';
                    btnPostular.classList.replace('btn-warning', 'btn-success');
                    btnPostular.removeAttribute('data-bs-toggle');
                    btnPostular.removeAttribute('data-bs-target');
                }

            } catch (err) {
                console.error('Error cargando vacante:', err);
                document.getElementById('vac-titulo').textContent = 'Error al cargar la vacante';
            }
        }

        // ── Enviar postulación ─────────────────────────────────────────────────
        document.getElementById('btn-enviar-postulacion').addEventListener('click', async () => {
            const btn      = document.getElementById('btn-enviar-postulacion');
            const feedback = document.getElementById('modal-feedback');
            const carta    = (document.getElementById('carta-presentacion').value || '').trim();
            feedback.innerHTML = '';
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const res  = await fetch('/api/vacantes/' + idVacante + '/postular', {
                    method:  'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ carta_presentacion: carta })
                });

                if (res.status === 401) {
                    window.location.href = '/usuario/usuario-login.html';
                    return;
                }

                const data = await res.json();

                if (data.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('modalPostular')).hide();
                    const btnPost = document.getElementById('btn-postular');
                    btnPost.disabled = true;
                    btnPost.innerHTML = '<i class="bi bi-check-circle me-1"></i>Ya postulado';
                    btnPost.classList.replace('btn-warning', 'btn-success');
                    btnPost.removeAttribute('data-bs-toggle');
                    btnPost.removeAttribute('data-bs-target');
                } else {
                    feedback.innerHTML = '<div class="alert alert-danger py-2 small mb-2">' + data.message + '</div>';
                }
            } catch (err) {
                feedback.innerHTML = '<div class="alert alert-danger py-2 small mb-2">Error de conexión.</div>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send-fill me-1"></i>Enviar Postulación';
            }
        });
    </script>
</body>
</html>
