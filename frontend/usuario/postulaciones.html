<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Postulaciones - TrabajoSV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background-color: #f0f2f8; }

        .page-hero {
            background: linear-gradient(135deg, #2e3266 0%, #4a51b5 100%);
            padding: 36px 0 60px;
        }

        .content-wrapper {
            margin-top: -36px;
        }

        .info-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #eef0f5;
            box-shadow: 0 2px 12px rgba(46,50,102,0.07);
            padding: 24px;
        }

        .postulacion-item {
            padding: 14px 0;
            border-bottom: 1px solid #f0f2f8;
        }
        .postulacion-item:last-child { border-bottom: none; }

        .estado-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        .filter-check .form-check-input:checked {
            background-color: #2e3266;
            border-color: #2e3266;
        }
    </style>
</head>
<body>

    <nav id="nav-website" class="navbar navbar-expand-lg sticky-top"></nav>

    <!-- Hero -->
    <div class="page-hero">
        <div class="container">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
                     style="width:48px;height:48px;background:rgba(255,255,255,0.15);">
                    <i class="bi bi-file-earmark-check-fill text-white" style="font-size:1.4rem;"></i>
                </div>
                <div>
                    <h4 class="text-white fw-bold mb-0">Mis Postulaciones</h4>
                    <p class="text-white mb-0" style="opacity:0.75;font-size:0.875rem;">Historial y estado de tus aplicaciones</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="container content-wrapper pb-5">
        <div class="row g-4">

            <!-- Postulaciones list -->
            <div class="col-lg-8">
                <div class="info-card">
                    <h6 class="fw-bold mb-3" style="color:#1a1d2e;">Todas tus postulaciones</h6>
                    <div id="lista-postulaciones">
                        <div class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                            <p class="text-muted small mt-2 mb-0">Cargando...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar: resumen -->
            <div class="col-lg-4 d-flex flex-column gap-3">
                <div class="info-card">
                    <h6 class="fw-bold mb-3" style="color:#1a1d2e;">Resumen</h6>
                    <div class="d-flex justify-content-between align-items-center py-2" style="border-bottom:1px solid #f0f2f8;">
                        <span class="text-muted small">Total aplicaciones</span>
                        <span class="fw-bold" id="resumen-total">—</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2" style="border-bottom:1px solid #f0f2f8;">
                        <span class="text-muted small">En revisión</span>
                        <span class="fw-bold" style="color:#d97706;" id="resumen-revision">—</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2" style="border-bottom:1px solid #f0f2f8;">
                        <span class="text-muted small">Entrevista</span>
                        <span class="fw-bold" style="color:#0891b2;" id="resumen-entrevista">—</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-2">
                        <span class="text-muted small">Contratadas</span>
                        <span class="fw-bold" style="color:#059669;" id="resumen-contratado">—</span>
                    </div>
                </div>

                <div class="info-card">
                    <h6 class="fw-bold mb-3" style="color:#1a1d2e;">Filtrar por estado</h6>
                    <div class="filter-check d-flex flex-column gap-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="f-enviada" value="enviada" checked>
                            <label class="form-check-label small" for="f-enviada">Enviada</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="f-revision" value="en_revision" checked>
                            <label class="form-check-label small" for="f-revision">En revisión</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="f-entrevista" value="entrevista" checked>
                            <label class="form-check-label small" for="f-entrevista">Entrevista</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="f-contratado" value="contratado" checked>
                            <label class="form-check-label small" for="f-contratado">Contratado</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="f-rechazada" value="rechazada" checked>
                            <label class="form-check-label small" for="f-rechazada">Rechazada</label>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer id="footer-website" class="py-3 mt-4"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmDEEgt7pkS3R4LxQmvO2iM8KS3e" crossorigin="anonymous"></script>
    <script src="/js/app.js"></script>
    <script>
        const estadoConfig = {
            enviada:     { label: 'Enviada',     dot: '#6b7280', bg: '#f3f4f6', color: '#374151' },
            en_revision: { label: 'En revisión', dot: '#d97706', bg: '#fffbeb', color: '#92400e' },
            entrevista:  { label: 'Entrevista',  dot: '#0891b2', bg: '#ecfeff', color: '#164e63' },
            contratado:  { label: 'Contratado',  dot: '#059669', bg: '#ecfdf5', color: '#065f46' },
            rechazada:   { label: 'Rechazada',   dot: '#dc2626', bg: '#fef2f2', color: '#991b1b' }
        };

        function estadoBadge(estado) {
            const cfg = estadoConfig[estado] || { label: estado, dot: '#6b7280', bg: '#f3f4f6', color: '#374151' };
            return `<span style="background:${cfg.bg};color:${cfg.color};font-size:0.72rem;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;">
                <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${cfg.dot};margin-right:5px;vertical-align:middle;"></span>${cfg.label}
            </span>`;
        }

        let todasPostulaciones = [];

        function renderPostulaciones(lista) {
            const el = document.getElementById('lista-postulaciones');
            if (!lista || lista.length === 0) {
                el.innerHTML = '<p class="text-muted small py-3 mb-0">No hay postulaciones para mostrar.</p>';
                return;
            }
            el.innerHTML = lista.map(p => `
                <div class="postulacion-item d-flex justify-content-between align-items-center gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
                             style="width:40px;height:40px;background:#eef2ff;">
                            <i class="bi bi-briefcase-fill" style="color:#2e3266;"></i>
                        </div>
                        <div>
                            <p class="fw-semibold mb-0" style="font-size:0.875rem;color:#1a1d2e;">${p.titulo}</p>
                            <p class="text-muted mb-0" style="font-size:0.78rem;">${p.nombre_empresa || ''}${p.ubicacion ? ' · ' + p.ubicacion : ''}</p>
                        </div>
                    </div>
                    ${estadoBadge(p.estado)}
                </div>
            `).join('');
        }

        function actualizarResumen(postulaciones) {
            document.getElementById('resumen-total').textContent = postulaciones.length;
            document.getElementById('resumen-revision').textContent = postulaciones.filter(p => p.estado === 'en_revision').length;
            document.getElementById('resumen-entrevista').textContent = postulaciones.filter(p => p.estado === 'entrevista').length;
            document.getElementById('resumen-contratado').textContent = postulaciones.filter(p => p.estado === 'contratado').length;
        }

        function aplicarFiltros() {
            const checked = Array.from(document.querySelectorAll('.filter-check input:checked')).map(i => i.value);
            renderPostulaciones(todasPostulaciones.filter(p => checked.includes(p.estado)));
        }

        document.querySelectorAll('.filter-check input').forEach(cb => cb.addEventListener('change', aplicarFiltros));

        async function loadPostulaciones() {
            try {
                const res = await fetch('/api/candidato/perfil', { credentials: 'include' });
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/usuario/usuario-login.html';
                    return;
                }
                const data = await res.json();
                if (!data.ok) throw new Error(data.message);

                todasPostulaciones = data.postulaciones || [];
                actualizarResumen(todasPostulaciones);
                renderPostulaciones(todasPostulaciones);
            } catch (err) {
                console.error('Error cargando postulaciones:', err);
                document.getElementById('lista-postulaciones').innerHTML =
                    '<p class="text-danger small py-3 mb-0">Error al cargar las postulaciones.</p>';
            }
        }

        loadPostulaciones();
    </script>
</body>
</html>
