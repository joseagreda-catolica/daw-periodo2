<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Postulaciones - TrabajoSV</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<style>
:root {
    --ts-blue: #2c3e60;
    --ts-beige: #e9e6d9;
    --ts-bg: #ffffff;
    --ts-text: #4a4a4a;
}

body {
    background-color: var(--ts-bg);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* NAV SIMULADA */
.navbar-simulada {
    background-color: var(--ts-blue);
    height: 60px;
    margin-bottom: 40px;
}

/* CARDS */
.ts-card {
    background-color: var(--ts-beige);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
    border: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.ts-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

/* TITULOS */
.page-title {
    color: var(--ts-blue);
    font-weight: 700;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
}

.sidebar-title {
    color: var(--ts-blue);
    font-weight: 700;
    font-size: 1.1rem;
}

/* TEXTO */
.card-title {
    color: var(--ts-blue);
    font-size: 1.25rem;
}

.card-company {
    color: #6c757d;
    font-style: italic;
}

.card-date {
    color: #8c8c8c;
    font-size: 0.9rem;
}

.card-status-label {
    color: var(--ts-blue);
    font-weight: 700;
}

/* BOTON */
.btn-ver-detalle {
    border: 2px solid var(--ts-blue);
    color: var(--ts-blue);
    background: transparent;
    font-weight: 600;
    padding: 6px 18px;
    border-radius: 6px;
    transition: all 0.2s;
}

.btn-ver-detalle:hover {
    background: var(--ts-blue);
    color: white;
}

.btn-ver-detalle:active {
    transform: scale(0.97);
}

/* BADGES */
.badge-estado {
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.85rem;
}

.bg-aceptado { background: #4ade80; }
.bg-revision { background: #facc15; }
.bg-enviado { background: #3b82f6; color: #fff; }
.bg-rechazado { background: #ef4444; color: #fff; }

/* CHECKBOX */
.form-check-input:checked {
    background-color: var(--ts-blue);
    border-color: var(--ts-blue);
}
</style>
</head>

<body>

<div class="navbar-simulada"></div>

<div class="container pb-5">

<h2 class="page-title">Mis Postulaciones</h2>

<div class="row g-4">

<!-- LISTA -->
<div class="col-lg-8" id="lista-postulaciones">
    <div class="ts-card text-center py-5">
        <div class="spinner-border text-secondary"></div>
        <p class="mt-2">Cargando...</p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="col-lg-4">

<div class="ts-card mb-4">
<h5 class="sidebar-title">Filtrar por Estado</h5>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="enviado" checked>
<label class="form-check-label">Enviado</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="en_revision" checked>
<label class="form-check-label">En revisión</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="aceptado" checked>
<label class="form-check-label">Aceptado</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="rechazado" checked>
<label class="form-check-label">Rechazado</label>
</div>

</div>

<div class="ts-card">
<h5 class="sidebar-title">Resumen</h5>
<p>Aplicaciones: <span id="resumen-total">0</span></p>
<p>Aceptadas: <span id="resumen-aceptado">0</span></p>
</div>

</div>
</div>
</div>

<script>
const datos = [
{ titulo:"Desarrollador web", empresa:"Tech Solutions Inc.", fecha:"10 Oct 2024", estado:"aceptado", bg:"bg-aceptado", label:"Aceptado" },
{ titulo:"DBA Junior", empresa:"DataCorp.", fecha:"22 Ene 2025", estado:"en_revision", bg:"bg-revision", label:"En revisión" },
{ titulo:"Administrador de Redes", empresa:"Networks Inc.", fecha:"02 Mar 2026", estado:"enviado", bg:"bg-enviado", label:"Enviado" }
];

function crearCard(p){
return `
<div class="ts-card d-flex flex-column flex-md-row justify-content-between align-items-md-center">
<div>
<h4 class="card-title fw-bold mb-1">${p.titulo}</h4>
<p class="card-company">${p.empresa}</p>
<p class="card-date">${p.fecha}</p>
<span class="card-status-label">Estado</span>
<span class="badge-estado ${p.bg}">${p.label}</span>
</div>
<a class="btn-ver-detalle mt-3 mt-md-0">Ver Detalle</a>
</div>
`;
}

function render(lista){
document.getElementById("lista-postulaciones").innerHTML =
lista.map(crearCard).join("");
}

function filtros(){
return [...document.querySelectorAll(".form-check-input:checked")]
.map(e=>e.value);
}

function aplicar(){
const activos=filtros();
const filtrados=datos.filter(d=>activos.includes(d.estado));
render(filtrados);

document.getElementById("resumen-total").textContent=filtrados.length;
document.getElementById("resumen-aceptado").textContent=
filtrados.filter(d=>d.estado==="aceptado").length;
}

document.querySelectorAll(".form-check-input")
.forEach(cb=>cb.addEventListener("change", aplicar));

setTimeout(()=>aplicar(),500);
</script>

</body>
</html>
