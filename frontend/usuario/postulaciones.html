<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO-LAB - Mis Postulaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">CO-LAB</a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <i class="bi bi-bell text-white fs-5"></i>
                <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
                    <i class="bi bi-person text-white"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="fw-bold mb-4">Mis Postulaciones</h2>
        
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="bg-secondary bg-opacity-10 p-4 rounded-4">
                    
                    <div class="card border-0 shadow-sm p-4 mb-3 rounded-4">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="fw-bold mb-1">Desarrollador Web</h5>
                                <p class="text-muted small mb-2">Tech Solutions Inc. • 10 Oct 2024</p>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="badge bg-success bg-opacity-10 text-success border border-success px-3 py-2">Aceptado</span>
                                </div>
                            </div>
                            <button class="btn btn-outline-primary btn-sm rounded-pill px-3">Ver Detalle</button>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm p-4 mb-3 rounded-4">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="fw-bold mb-1">DBA Junior</h5>
                                <p class="text-muted small mb-2">DataCorp • 22 Ene 2025</p>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="badge bg-warning bg-opacity-10 text-dark border border-warning px-3 py-2">En Revisión</span>
                                </div>
                            </div>
                            <button class="btn btn-outline-primary btn-sm rounded-pill px-3">Ver Detalle</button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 rounded-4 mb-4">
                    <h6 class="fw-bold mb-3">Filtrar por Estado</h6>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="f1">
                        <label class="form-check-label small" for="f1">Enviado</label>
                    </div>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="f2" checked>
                        <label class="form-check-label small" for="f2">En Revisión</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="f3">
                        <label class="form-check-label small" for="f3">Aceptado</label>
                    </div>
                </div>

                <div class="card border-0 shadow-sm p-4 rounded-4 bg-white">
                    <h6 class="fw-bold mb-3">Resumen</h6>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted small">Aplicaciones:</span>
                        <span class="fw-bold">3</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted small">Aceptadas:</span>
                        <span class="fw-bold text-success">1</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
