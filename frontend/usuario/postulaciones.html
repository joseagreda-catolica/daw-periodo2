<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Postulaciones - TrabajoSV</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<style>
:root {
    --ts-blue: #2c3e60;
    --ts-beige: #e9e6d9;
    --ts-bg: #ffffff;
    --ts-text: #4a4a4a;
}

body {
    background-color: var(--ts-bg);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* NAV SIMULADA */
.navbar-simulada {
    background-color: var(--ts-blue);
    height: 60px;
    margin-bottom: 40px;
}

/* CARDS */
.ts-card {
    background-color: var(--ts-beige);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
    border: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.ts-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

/* TITULOS */
.page-title {
    color: var(--ts-blue);
    font-weight: 700;
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
}

.sidebar-title {
    color: var(--ts-blue);
    font-weight: 700;
    font-size: 1.1rem;
}

/* TEXTO */
.card-title {
    color: var(--ts-blue);
    font-size: 1.25rem;
}

.card-company {
    color: #6c757d;
    font-style: italic;
}

.card-date {
    color: #8c8c8c;
    font-size: 0.9rem;
}

.card-status-label {
    color: var(--ts-blue);
    font-weight: 700;
}

/* BOTON */
.btn-ver-detalle {
    border: 2px solid var(--ts-blue);
    color: var(--ts-blue);
    background: transparent;
    font-weight: 600;
    padding: 6px 18px;
    border-radius: 6px;
    transition: all 0.2s;
}

.btn-ver-detalle:hover {
    background: var(--ts-blue);
    color: white;
}

.btn-ver-detalle:active {
    transform: scale(0.97);
}

/* BADGES */
.badge-estado {
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.85rem;
}

.bg-aceptado { background: #4ade80; }
.bg-revision { background: #facc15; }
.bg-enviado { background: #3b82f6; color: #fff; }
.bg-rechazado { background: #ef4444; color: #fff; }

/* CHECKBOX */
.form-check-input:checked {
    background-color: var(--ts-blue);
    border-color: var(--ts-blue);
}
</style>
</head>

<body>

<nav id="nav-website" class="navbar navbar-expand-lg sticky-top navbar-dark" style="background-color: var(--ts-blue); border-bottom: 1px solid rgba(255,255,255,0.1);"></nav>

<div class="container pb-5">

<h2 class="page-title">Mis Postulaciones</h2>

<div class="row g-4">

<!-- LISTA -->
<div class="col-lg-8" id="lista-postulaciones">
    <div class="ts-card text-center py-5">
        <div class="spinner-border text-secondary"></div>
        <p class="mt-2">Cargando...</p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="col-lg-4">

<div class="ts-card mb-4">
<h5 class="sidebar-title">Filtrar por Estado</h5>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="enviada" checked>
<label class="form-check-label">Enviada</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="en_revision" checked>
<label class="form-check-label">En revisión</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="entrevista" checked>
<label class="form-check-label">Entrevista</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="contratado" checked>
<label class="form-check-label">Contratado</label>
</div>

<div class="form-check">
<input type="checkbox" class="form-check-input" value="rechazada" checked>
<label class="form-check-label">Rechazada</label>
</div>

</div>

<div class="ts-card">
<h5 class="sidebar-title">Resumen</h5>
<p>Aplicaciones: <span id="resumen-total">0</span></p>
<p>Aceptadas: <span id="resumen-aceptado">0</span></p>
</div>

</div>
</div>
</div>

<script type="module">
import { loadNavbar, loadFooter } from '/js/app.js';

let datos = [];

async function verificarSesion() {
  try {
    const res = await fetch('/api/auth/check-session', { credentials: 'include' });
    const data = await res.json();
    if (!data.logged) {
      window.location.href = '/usuario/usuario-login.html';
      return false;
    }
    return true;
  } catch (err) {
    console.error('Error verificando sesión:', err);
    return false;
  }
}

async function cargarPostulaciones() {
  try {
    const res = await fetch('/api/candidato/postulaciones', { credentials: 'include' });

    if (res.status === 401) {
      window.location.href = '/usuario/usuario-login.html';
      return;
    }

    const data = await res.json();
    if (!data.ok || !data.postulaciones) {
      document.getElementById("lista-postulaciones").innerHTML =
        '<div class="ts-card text-center py-5"><p class="text-muted">No tienes postulaciones aún.</p></div>';
      return;
    }

    datos = data.postulaciones.map(p => {
      const estadoMap = {
        'enviada': { bg: 'bg-enviado', label: 'Enviada' },
        'en_revision': { bg: 'bg-revision', label: 'En revisión' },
        'entrevista': { bg: 'bg-revision', label: 'Entrevista' },
        'contratado': { bg: 'bg-aceptado', label: 'Contratado' },
        'rechazada': { bg: 'bg-rechazado', label: 'Rechazada' }
      };
      const estado = estadoMap[p.estado] || { bg: 'bg-enviado', label: p.estado };
      return {
        id: p.id_vacante,
        titulo: p.titulo,
        empresa: p.nombre_empresa,
        fecha: new Date(p.fecha_postulacion).toLocaleDateString('es-SV'),
        estado: p.estado,
        ...estado
      };
    });

    aplicar();
  } catch (err) {
    console.error('Error cargando postulaciones:', err);
    document.getElementById("lista-postulaciones").innerHTML =
      '<div class="ts-card text-center py-5"><p class="text-danger">Error al cargar postulaciones.</p></div>';
  }
}

function crearCard(p) {
  return `
    <div class="ts-card d-flex flex-column flex-md-row justify-content-between align-items-md-center">
      <div>
        <h4 class="card-title fw-bold mb-1">${p.titulo}</h4>
        <p class="card-company">${p.empresa}</p>
        <p class="card-date">${p.fecha}</p>
        <span class="card-status-label">Estado</span>
        <span class="badge-estado ${p.bg}">${p.label}</span>
      </div>
      <a href="/usuario/detalle-vacante.html?id=${p.id}" target="_blank" class="btn-ver-detalle mt-3 mt-md-0">Ver Detalle</a>
    </div>
  `;
}

function render(lista) {
  if (lista.length === 0) {
    document.getElementById("lista-postulaciones").innerHTML =
      '<div class="ts-card text-center py-5"><p class="text-muted">No hay postulaciones con los filtros seleccionados.</p></div>';
  } else {
    document.getElementById("lista-postulaciones").innerHTML = lista.map(crearCard).join("");
  }
}

function filtros() {
  return [...document.querySelectorAll(".form-check-input:checked")].map(e => e.value);
}

function aplicar() {
  const activos = filtros();
  const filtrados = datos.filter(d => activos.includes(d.estado));
  render(filtrados);

  document.getElementById("resumen-total").textContent = datos.length;
  document.getElementById("resumen-aceptado").textContent =
    datos.filter(d => d.estado === 'contratado').length;
}

// Inicializar
(async () => {
  if (await verificarSesion()) {
    await loadNavbar();
    await cargarPostulaciones();

    document.querySelectorAll(".form-check-input")
      .forEach(cb => cb.addEventListener("change", aplicar));
  }
})();
</script>

</body>
</html>
