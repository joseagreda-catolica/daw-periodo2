<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertas de Empleo - TrabajoSV</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<style>

:root {
    --ts-blue: #2c3e60;
    --ts-beige: #e9e6d9;
    --ts-light: #f3f3f1;
}

body {
    background: #f3f3f1; /* más suave que el gris actual */
}

.page-hero {
    background: var(--ts-blue);
    padding: 20px 0 50px; /* ↓ antes era demasiado grande */
}

.page-hero {
    min-height: 120px;
}

.page-hero h4 {
    font-size: 1.6rem;
}

.page-hero p {
    font-size: 0.9rem;
    opacity: 0.8;
}

.content-wrapper {
    margin-top: -60px; /* antes -36px → muy poco */
}
.info-card {
    background: var(--ts-beige);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.04);
}

.alerta-item {
    background: var(--ts-beige);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    border: none;
    transition: all 0.15s ease;
}

.alerta-item:hover {
    transform: translateY(-2px);
}

.text-title {
    font-size: 0.875rem;
    color: #1a1d2e;
}

.form-control, .form-select {
    background-color: #fff;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.container {
    max-width: 1100px; /* reduce el ancho general */
}

.btn-warning {
    background-color: var(--ts-blue);
    border: none;
    color: white;
    font-weight: 600;
    border-radius: 8px;
}

.btn-warning:hover {
    background-color: #1f2f4d;
}

#alerta-feedback {
    transition: opacity 0.3s ease;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark" style="background:#2c3e60;">
<div class="container">
<span class="navbar-brand fw-bold">TrabajoSV</span>
</div>
</nav>

<div class="page-hero">
<div class="container">
<h4 class="text-white fw-bold">Alertas de Empleo</h4>
<p class="text-white-50">Recibe notificaciones de nuevas vacantes</p>
</div>
</div>

<div class="container content-wrapper pb-5">
<div class="row g-4">

<!-- LISTA -->
<div class="col-lg-7">
<div class="info-card">
<div class="d-flex justify-content-between mb-3">
<h6 class="fw-bold">Tus alertas</h6>
<span id="contador-alertas" class="badge bg-light text-dark">0</span>
</div>
<div id="lista-alertas"></div>
</div>
</div>

<!-- FORM -->
<div class="col-lg-5">
<div class="info-card">

<h6 class="fw-bold mb-4">Crear nueva alerta</h6>

<input id="alerta-keyword" class="form-control mb-3" placeholder="Puesto o palabra clave">
<input id="alerta-ubicacion" class="form-control mb-3" placeholder="Ubicación">

<select id="alerta-tipo" class="form-select mb-3">
<option value="">Cualquier tipo</option>
<option value="tiempo_completo">Tiempo completo</option>
<option value="medio_tiempo">Medio tiempo</option>
<option value="temporal">Contrato Temporal</option>
<option value="freelance">Freelance</option>
<option value="practicas">Prácticas</option>
</select>

<button id="btn-guardar-alerta" class="btn btn-warning w-100">
Guardar alerta
</button>

<div id="alerta-feedback" class="mt-2 small"></div>

</div>
</div>

</div>
</div>

<script>
// Verificar sesión al inicio
document.addEventListener('DOMContentLoaded', async () => {
    const sess = await fetch('/api/auth/check-session', { credentials: 'include' }).then(r => r.json());
    if (!sess.logged) {
        window.location.href = '/usuario/usuario-login.html';
        return;
    }
    loadAlertas();
});

async function loadAlertas() {
    const res = await fetch('/api/candidato/alertas', { credentials:'include' });
    const data = await res.json();
    renderAlertas(data.ok ? data.alertas : []);
}

function renderAlertas(alertas) {
    const el = document.getElementById('lista-alertas');
    const contador = document.getElementById('contador-alertas');

    const activas = alertas.filter(a => a.activo);
    contador.textContent = activas.length;

    if (!alertas.length) {
        el.innerHTML = '<p class="text-muted small">No hay alertas.</p>';
        return;
    }

    const tipoLabel = {
        tiempo_completo:'Tiempo completo',
        medio_tiempo:'Medio tiempo',
        freelance:'Freelance',
        practicas:'Prácticas'
    };

    el.innerHTML = alertas.map(a => `
        <div class="alerta-item d-flex justify-content-between align-items-center">
            <div>
                <p class="fw-semibold mb-0 text-title">${a.palabra_clave}</p>
                <p class="text-muted small mb-0">
                    ${a.ubicacion ? `📍 ${a.ubicacion} · ` : ''}
                    ${a.tipo_trabajo ? `💼 ${tipoLabel[a.tipo_trabajo]}` : ''}
                </p>
            </div>

            <div class="d-flex gap-2">
                <input type="checkbox" class="form-check-input toggle-alerta"
                    data-id="${a.id_alerta}" ${a.activo ? 'checked':''}>
                <button class="btn btn-sm btn-eliminar" data-id="${a.id_alerta}">
                    🗑
                </button>
            </div>
        </div>
    `).join('');
}

document.addEventListener("click", async (e) => {

    if (e.target.closest(".btn-eliminar")) {
        const id = e.target.closest(".btn-eliminar").dataset.id;

        if (!confirm("¿Eliminar alerta?")) return;

        await fetch(`/api/candidato/alertas/${id}`, {
            method:'DELETE',
            credentials:'include'
        });

        loadAlertas();
    }

});

document.addEventListener("change", async (e) => {
    if (e.target.classList.contains("toggle-alerta")) {
        const id = e.target.dataset.id;

        await fetch(`/api/candidato/alertas/${id}/toggle`, {
            method:'PUT',
            credentials:'include'
        });

        loadAlertas();
    }
});

document.getElementById('btn-guardar-alerta').addEventListener('click', async () => {

    const keyword = document.getElementById('alerta-keyword').value.trim();
    const ubicacion = document.getElementById('alerta-ubicacion').value.trim();
    const tipo = document.getElementById('alerta-tipo').value;
    const feedback = document.getElementById('alerta-feedback');

    if (!keyword) {
        feedback.innerHTML = '<span class="text-danger">Ingresa un puesto.</span>';
        return;
    }

    const res = await fetch('/api/candidato/alertas', {
        method:'POST',
        credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            palabra_clave: keyword,
            ubicacion: ubicacion || null,
            tipo_trabajo: tipo || null
        })
    });

    const data = await res.json();

    if (data.ok) {
        document.getElementById('alerta-keyword').value = '';
        document.getElementById('alerta-ubicacion').value = '';
        document.getElementById('alerta-tipo').value = '';

        feedback.innerHTML = '<span class="text-success">✔ Guardado</span>';
        setTimeout(()=>feedback.innerHTML='',2000);

        loadAlertas();
    } else {
        feedback.innerHTML = '<span class="text-danger">Error</span>';
    }
});
</script>

</body>
</html>
