<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>DAW Usuario Crear Cuenta</title>
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-md bg-azul-oscuro">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="#">SV</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item link-light">
          <a class="nav-link" aria-current="page" href="/website/home-website.html">INICIO</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/website/empleos.html">EMPLEOS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/website/recursos.html">RECURSOS</a>
        </li>
      </ul>
      <a class="btn btn-warning no-apply-a" href="/usuario/usuario-login.html">Iniciar Sesion</a>
    </div>
  </div>
</nav>

<div class="d-flex flex-grow-1"> 

    <div class="row w-100 m-0 align-items-start align-items-md-stretch">
        <div class="col-md-5 d-flex bg-azul-oscuro">
            <div class="m-auto px-3 w-md-100">
                <h5 class="fs-3">Crea tu perfil y comienza hoy mismo</h5>
                <p class="fw-normal w-75">Unete a más de 18,000 profesionales que ya encontraron su trabajo ideal en TrabajaSV.</p>
                <!-- <ul class="li-marker-yellow fw-normal">
                        <li>Postúlate con un Click</li>
                        <li>Alertas de empleo personalizadas</li>
                        <li>Estadísticas de tu perfil</li>
                    <li>Valorar empresas donde trabajastes</li>
                </ul> -->
            </div>
        </div>
        <div class="col-md-7 bg-beige-suave">
            <div class="p-4 mt-4">
                <h5 class="fs-4">Crear cuenta</h5>
                <p class="fw-normal">Como deseas registrate?</p>
                <div class="d-flex gap-4 px-4" id="rol-btns">
                    <button type="button" id="btn-candidato" class="btn btn-primary flex-grow-1" onclick="setRol('candidato')"><i class="bi bi-person-check me-2"></i>Soy Candidato</button>
                    <button type="button" id="btn-empresa" class="btn btn-light flex-grow-1" onclick="setRol('empresa')"><i class="bi bi-building-check me-2"></i>Soy Empresa</button>
                </div>
                <form action="/auth/register" method="POST" class="d-flex flex-column gap-3 p-4">
                    <input type="hidden" name="rol" id="rol-input" value="candidato">
                    <div class="row g-2">
                        <div class="col-6">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Juan" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label for="apellido">Apellido</label>
                            <input type="text" id="apellido" name="apellido" placeholder="Pérez" class="form-control" required>
                        </div>
                    </div>
                    <div id="campo-empresa" style="display:none;">
                        <label for="nombre_empresa">Nombre de empresa</label>
                        <input type="text" id="nombre_empresa" name="nombre_empresa" placeholder="Mi Empresa SV" class="form-control" required>
                    </div>
                    <div>
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" name="email" placeholder="tu@correo.com" class="form-control" required>
                    </div>
                    <div>
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" class="form-control" required>
                    </div>
                    <div>
                        <label for="password2">Confirmar Contraseña</label>
                        <input type="password" id="password2" name="password2" placeholder="••••••••" class="form-control" required>
                        <small class="text-danger d-none" id="password-mismatch">Las contraseñas no coinciden</small>
                    </div>

                    <button type="submit" class="btn btn-warning flex-grow-1 w-50 mx-auto" id="btn-submit">Crear mi cuenta gratis</button>
                </form>
                <script>
                  function setRol(rol) {
                    document.getElementById('rol-input').value = rol;
                    const campoEmpresa = document.getElementById('campo-empresa');
                    const inputEmpresa = document.getElementById('nombre_empresa');
                    campoEmpresa.style.display = rol === 'empresa' ? '' : 'none';
                    if (rol === 'empresa') {
                      inputEmpresa.setAttribute('required', 'required');
                    } else {
                      inputEmpresa.removeAttribute('required');
                    }
                    document.getElementById('btn-candidato').className = 'btn flex-grow-1 ' + (rol === 'candidato' ? 'btn-primary' : 'btn-light');
                    document.getElementById('btn-empresa').className   = 'btn flex-grow-1 ' + (rol === 'empresa'   ? 'btn-primary' : 'btn-light');
                  }

                  // Validación de contraseñas que coincidan
                  const form = document.querySelector('form');
                  const password = document.getElementById('password');
                  const password2 = document.getElementById('password2');
                  const passwordMismatch = document.getElementById('password-mismatch');

                  function validatePasswords() {
                    if (password.value !== password2.value) {
                      passwordMismatch.classList.remove('d-none');
                      return false;
                    } else {
                      passwordMismatch.classList.add('d-none');
                      return true;
                    }
                  }

                  password2.addEventListener('blur', validatePasswords);
                  form.addEventListener('submit', (e) => {
                    if (!validatePasswords()) {
                      e.preventDefault();
                    }
                  });
                </script>
                <p class="text-center">
                    Ya tienes una cuenta?
                    <a href="/usuario/usuario-login.html">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
