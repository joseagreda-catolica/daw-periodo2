<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>DAW Usuario Crear Cuenta</title>
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-md bg-azul-oscuro">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="#">SV</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item link-light">
          <a class="nav-link" aria-current="page" href="#">INICIO</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">EMPLEOS</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">RECURSOS</a>
        </li>
      </ul>
      <a class="btn btn-warning no-apply-a" href="/usuario/usuario-login.html">Iniciar Sesion</a>
    </div>
  </div>
</nav>

<div class="d-flex flex-grow-1"> 

    <div class="row w-100 m-0 align-items-start align-items-md-stretch">
        <div class="col-md-5 d-flex bg-azul-oscuro">
            <div class="m-auto px-3 w-md-100">
                <h5 class="fs-3">Crea tu perfil y comienza hoy mismo</h5>
                <p class="fw-normal w-75">Unete a más de 18,000 profesionales que ya encontraron su trabajo ideal en TrabajaSV.</p>
                <!-- <ul class="li-marker-yellow fw-normal">
                        <li>Postúlate con un Click</li>
                        <li>Alertas de empleo personalizadas</li>
                        <li>Estadísticas de tu perfil</li>
                    <li>Valorar empresas donde trabajastes</li>
                </ul> -->
            </div>
        </div>
        <div class="col-md-7 bg-beige-suave">
            <div class="p-4 mt-4">
                <h5 class="fs-4">Crear cuenta</h5>
                <p class="fw-normal">Como deseas registrate?</p>
                <div class="d-flex gap-4 px-4">
                    <button type="button" class="btn btn-primary flex-grow-1"><i class="bi bi-person-check me-2"></i>Soy Candidato</button>
                    <button type="button" class="btn btn-light flex-grow-1"><i class="bi bi-building-check me-2"></i>Soy Empresa</button>
                </div>
                <form action="" class="d-flex flex-column gap-3 p-4">
                    <div>
                        <label for="email">Correo Electronico</label>
                        <input type="email" id="email" name="email" placeholder="tu@correo.com" class="form-control">
                    </div>
                    <div>
                        <label for="pass">Contraseña</label>
                        <input type="email" id="pass" name="pass" placeholder="tu@correo.com" class="form-control">
                    </div>
                    <a href="" class="mx-auto me-0">Olvidaste tu contrasena?</a>
                
                    <button class="btn btn-warning flex-grow-1 w-50 mx-auto">Crear mi cuenta gratis</button>
                </form>
                <p class="text-center">
                    Ya tienes una cuenta? 
                    <a href="/usuario/usuario-login.html">Inicis sesion</a>
                </p>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
