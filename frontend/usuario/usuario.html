<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Mi Perfil - TrabajoSV</title>
    <style>
        body { background-color: #f0f2f8; }

        .profile-hero {
            background: linear-gradient(135deg, #2e3266 0%, #4a51b5 100%);
            padding: 40px 0 70px;
        }
        .profile-avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem;
            color: #fff;
        }
        .profile-card-wrapper {
            margin-top: -50px;
        }

        .info-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .info-card-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .info-card-body { padding: 16px 20px; }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
        }

        .skill-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            background: #eef2ff;
            color: #2e3266;
            border: 1px solid #c7d2fe;
        }

        .postulacion-item {
            border-radius: 10px;
            border: 1px solid #f3f4f6;
            padding: 14px 16px;
            background: #fff;
            transition: box-shadow 0.15s;
        }
        .postulacion-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .estado-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav id="nav-website" class="navbar navbar-expand-lg"></nav>

    <!-- Hero -->
    <div class="profile-hero">
        <div class="container">
            <div class="d-flex align-items-center gap-4 flex-wrap">
                <div class="profile-avatar">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div>
                    <h4 class="text-white fw-bold mb-1" id="perfil-nombre">Cargando...</h4>
                    <p class="text-white-50 mb-1 small" id="perfil-titulo-ubicacion"></p>
                    <p class="text-white-50 mb-0 small" id="perfil-email"></p>
                </div>
                <div class="ms-auto d-none d-md-flex gap-2">
                    <button class="btn btn-light btn-sm rounded-pill px-3 shadow-sm"
                            data-bs-toggle="modal" data-bs-target="#modalEditarPerfil">
                        <i class="bi bi-pencil-fill me-1"></i>Editar perfil
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container profile-card-wrapper flex-grow-1 pb-5">
        <div class="row g-4">

            <!-- Left column -->
            <div class="col-md-4 d-flex flex-column gap-3">

                <!-- Sobre mí -->
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-person-lines-fill me-1"></i>Sobre mí</span>
                    </div>
                    <div class="info-card-body">
                        <p class="small text-secondary mb-0" id="perfil-resumen">—</p>
                    </div>
                </div>

                <!-- Información de contacto -->
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-telephone-fill me-1"></i>Contacto</span>
                    </div>
                    <div class="info-card-body d-flex flex-column gap-2">
                        <div class="small text-secondary" id="perfil-telefono-wrap" style="display:none;">
                            <i class="bi bi-telephone me-1"></i><span id="perfil-telefono"></span>
                        </div>
                        <div class="small text-secondary" id="perfil-ubicacion-wrap" style="display:none;">
                            <i class="bi bi-geo-alt me-1"></i><span id="perfil-ubicacion"></span>
                        </div>
                        <p class="small text-muted mb-0" id="perfil-contacto-vacio">Sin información de contacto.</p>
                    </div>
                </div>

                <!-- CV -->
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-file-earmark-person-fill me-1"></i>Curriculum Vitae</span>
                    </div>
                    <div class="info-card-body">
                        <div id="cv-info-wrap" class="d-flex align-items-center gap-3 p-2 rounded-3" style="background:#fff7ed;display:none;">
                            <i class="bi bi-file-earmark-pdf-fill text-danger fs-3"></i>
                            <div class="small">
                                <div class="fw-semibold text-dark" id="cv-filename">—</div>
                                <a href="#" id="cv-link" target="_blank" class="text-muted" style="font-size:0.72rem;">Ver CV</a>
                            </div>
                        </div>
                        <div id="cv-empty-wrap" class="text-muted small">Sin CV adjunto.</div>
                        <button class="btn btn-outline-secondary btn-sm w-100 mt-3 rounded-pill"
                                data-bs-toggle="modal" data-bs-target="#modalSubirCV">
                            <i class="bi bi-upload me-1"></i>Subir nuevo CV
                        </button>
                    </div>
                </div>

            </div>

            <!-- Right column -->
            <div class="col-md-8">
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-send-fill me-1"></i>Mis Postulaciones</span>
                    </div>
                    <div class="info-card-body d-flex flex-column gap-2" id="perfil-postulaciones">
                        <p class="text-muted small text-center py-3">Cargando postulaciones...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer id="footer-website" class=""></footer>

    <!-- Modal: Editar Perfil -->
    <div class="modal fade" id="modalEditarPerfil" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Editar Perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="perfil-edit-feedback" class="mb-2"></div>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-semibold">Título Profesional</label>
                            <input type="text" id="edit-titulo" class="form-control"
                                placeholder="Ej. Desarrollador Full Stack">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Ubicación</label>
                            <input type="text" id="edit-ubicacion" class="form-control"
                                placeholder="Ej. San Salvador">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Teléfono</label>
                            <input type="text" id="edit-telefono" class="form-control"
                                placeholder="Ej. 7000-0000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Fecha de Nacimiento</label>
                            <input type="date" id="edit-fecha-nacimiento" class="form-control">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-semibold">Resumen Profesional</label>
                            <textarea id="edit-resumen" class="form-control" rows="4"
                                placeholder="Cuéntanos sobre ti, tus habilidades y experiencia..."></textarea>
                        </div>
                    </div>
                    <button id="btn-guardar-perfil"
                        class="btn w-100 fw-semibold rounded-pill py-2 mt-4"
                        style="background:#2e3266;color:#fff;">
                        <i class="bi bi-check-circle me-1"></i>Guardar cambios
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Subir CV -->
    <div class="modal fade" id="modalSubirCV" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Subir Curriculum Vitae</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="cv-upload-feedback" class="mb-2"></div>
                    <div class="border-2 border-dashed rounded-3 p-4 text-center mb-3"
                         style="border:2px dashed #d1d5db;background:#f9fafb;">
                        <i class="bi bi-file-earmark-arrow-up fs-1 text-muted"></i>
                        <p class="small text-muted mt-2 mb-1">Selecciona tu archivo CV</p>
                        <p class="text-muted" style="font-size:0.72rem;">PDF, DOC o DOCX — máx. 5 MB</p>
                        <input type="file" id="cv-file" accept=".pdf,.doc,.docx"
                               class="form-control mt-2">
                    </div>
                    <button id="btn-subir-cv"
                        class="btn w-100 fw-semibold rounded-pill py-2"
                        style="background:#2e3266;color:#fff;">
                        <i class="bi bi-upload me-1"></i>Subir CV
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/app.js"></script>
    <script type="module" src="/js/usuario.js"></script>
</body>
</html>
