<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>Mi Perfil - TrabajoSV</title>
    <style>
        body { background-color: #f0f2f8; }

        /* Profile hero */
        .profile-hero {
            background: linear-gradient(135deg, #2e3266 0%, #4a51b5 100%);
            padding: 40px 0 70px;
        }
        .profile-avatar {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 3px solid rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem;
            color: #fff;
        }
        .profile-card-wrapper {
            margin-top: -50px;
        }

        /* Cards */
        .info-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .info-card-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .info-card-body { padding: 16px 20px; }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
        }

        /* Skills */
        .skill-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            background: #eef2ff;
            color: #2e3266;
            border: 1px solid #c7d2fe;
        }

        /* Postulaciones */
        .postulacion-item {
            border-radius: 10px;
            border: 1px solid #f3f4f6;
            padding: 14px 16px;
            background: #fff;
            transition: box-shadow 0.15s;
        }
        .postulacion-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .estado-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav id="nav-website" class="navbar navbar-expand-lg"></nav>

    <!-- Hero -->
    <div class="profile-hero">
        <div class="container">
            <div class="d-flex align-items-center gap-4">
                <div class="profile-avatar">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div>
                    <h4 class="text-white fw-bold mb-1" id="perfil-nombre">Cargando...</h4>
                    <p class="text-white-50 mb-1 small" id="perfil-titulo-ubicacion"></p>
                    <p class="text-white-50 mb-0 small" id="perfil-email"></p>
                </div>
                <div class="ms-auto d-none d-md-block">
                    <a href="#" class="btn btn-light btn-sm rounded-pill px-3 shadow-sm">
                        <i class="bi bi-pencil-fill me-1"></i>Editar perfil
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="container profile-card-wrapper flex-grow-1 pb-5">
        <div class="row g-4">

            <!-- Left column -->
            <div class="col-md-4 d-flex flex-column gap-3">

                <!-- Sobre mí -->
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-person-lines-fill me-1"></i>Sobre mí</span>
                    </div>
                    <div class="info-card-body">
                        <p class="small text-secondary mb-0" id="perfil-resumen">—</p>
                    </div>
                </div>

                <!-- Habilidades -->
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-stars me-1"></i>Habilidades</span>
                    </div>
                    <div class="info-card-body">
                        <div class="d-flex flex-wrap gap-2" id="perfil-habilidades">
                            <span class="text-muted small">Sin habilidades registradas</span>
                        </div>
                    </div>
                </div>

                <!-- CV -->
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-file-earmark-person-fill me-1"></i>Curriculum Vitae</span>
                    </div>
                    <div class="info-card-body">
                        <div class="d-flex align-items-center gap-3 p-2 rounded-3" style="background:#fff7ed;">
                            <i class="bi bi-file-earmark-pdf-fill text-danger fs-3"></i>
                            <div class="small">
                                <div class="fw-semibold text-dark">cv_perfil.pdf</div>
                                <div class="text-muted" style="font-size:0.72rem;">Documento adjunto</div>
                            </div>
                        </div>
                        <a href="#" class="btn btn-outline-secondary btn-sm w-100 mt-3 rounded-pill">
                            <i class="bi bi-upload me-1"></i>Subir nuevo CV
                        </a>
                    </div>
                </div>

            </div>

            <!-- Right column -->
            <div class="col-md-8">
                <div class="info-card">
                    <div class="info-card-header">
                        <span class="section-title"><i class="bi bi-send-fill me-1"></i>Mis Postulaciones</span>
                    </div>
                    <div class="info-card-body d-flex flex-column gap-2" id="perfil-postulaciones">
                        <p class="text-muted small text-center py-3">Cargando postulaciones...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer id="footer-website" class=""></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/app.js"></script>
    <script type="module" src="/js/usuario.js"></script>
</body>
</html>
