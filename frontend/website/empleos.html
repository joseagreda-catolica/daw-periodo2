<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>TrabajoSV - Empleos</title>
    <style>
        body { background-color: #f8f9fc; }

        .filter-bar {
            background: #E8E5D9;
            border-radius: 12px;
            padding: 16px 20px;
        }
        .filter-bar .form-control, .filter-bar .form-select {
            border: 1px solid #d0ccc0;
            background: #fff;
            border-radius: 8px;
            font-size: 0.875rem;
        }
        .filter-bar .form-control:focus, .filter-bar .form-select:focus {
            box-shadow: 0 0 0 3px rgba(46,50,102,0.15);
            border-color: #2e3266;
        }

        .jobs-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .jobs-panel-header {
            padding: 14px 18px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.8rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        #container-card-empleos {
            overflow-y: auto;
            max-height: calc(100vh - 260px);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            height: fit-content;
            position: sticky;
            top: 80px;
        }
        .detail-header {
            background: linear-gradient(135deg, #2e3266, #3d4494);
            border-radius: 12px 12px 0 0;
            padding: 24px;
        }
        .detail-body { padding: 24px; }
        .meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            background: #f3f4f6;
            color: #374151;
        }
        .meta-chip i { font-size: 0.9rem; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav id="nav-website" class="navbar navbar-expand-lg"></nav>

    <div id="div-root" class="container-fluid flex-column flex-grow-1 py-3 px-3 px-md-4">

        <!-- Filter bar -->
        <div id="container-filter" class="filter-bar mb-3">
            <form class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold mb-1" style="color:#4a4740;">Buscar empleo</label>
                    <input type="text" name="buscar" placeholder="Cargo, empresa o habilidad..."
                        class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold mb-1" style="color:#4a4740;">Ubicación</label>
                    <input list="ubicaciones-list" name="ubicacion" autocomplete="off"
                        placeholder="Ciudad o departamento" class="form-control">
                    <datalist id="ubicaciones-list">
                        <option value="Ahuachapán"></option>
                        <option value="Santa Ana"></option>
                        <option value="San Salvador"></option>
                        <option value="San Miguel"></option>
                        <option value="La Libertad"></option>
                        <option value="Sonsonate"></option>
                        <option value="Chalatenango"></option>
                    </datalist>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold mb-1" style="color:#4a4740;">Tipo</label>
                    <select name="tipo" class="form-select">
                        <option value="">Cualquier tipo</option>
                        <option value="tiempo_completo">Tiempo completo</option>
                        <option value="medio_tiempo">Medio tiempo</option>
                        <option value="freelance">Freelance</option>
                        <option value="practicas">Prácticas</option>
                        <option value="temporal">Temporal</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <label class="form-label small fw-semibold mb-1" style="color:#4a4740;">Nivel</label>
                    <select name="nivel" class="form-select">
                        <option value="">Todos</option>
                        <option value="sin_experiencia">Sin exp.</option>
                        <option value="junior">Junior</option>
                        <option value="mid">Mid</option>
                        <option value="senior">Senior</option>
                        <option value="directivo">Directivo</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-warning w-100 fw-semibold">
                        <i class="bi bi-search me-1"></i>Buscar
                    </button>
                </div>
            </form>
        </div>

        <p class="text-muted small fw-semibold mb-2 ms-1" style="letter-spacing:0.03em;">RESULTADOS DE BÚSQUEDA</p>

        <div class="row g-3 flex-grow-1">

            <!-- Left: Job cards list -->
            <div class="col-md-4">
                <div class="jobs-panel">
                    <div class="jobs-panel-header">Vacantes disponibles</div>
                    <div id="container-card-empleos">
                        <p class="text-muted small text-center py-3">Cargando empleos...</p>
                    </div>
                </div>
            </div>

            <!-- Right: Job detail -->
            <div class="col-md-8">
                <div class="detail-panel">

                    <!-- Placeholder inicial -->
                    <div id="detail-placeholder" class="detail-body text-center py-5">
                        <i class="bi bi-briefcase" style="font-size:3rem;color:#d1d5db;"></i>
                        <p class="text-muted mt-3">Selecciona una vacante para ver los detalles</p>
                    </div>

                    <!-- Contenido del detalle (oculto hasta seleccionar) -->
                    <div id="detail-panel-content" style="display:none;">
                        <div class="detail-header">
                            <h5 class="text-white fw-bold mb-1" id="detail-titulo">—</h5>
                            <p class="text-white-50 small mb-0">
                                <i class="bi bi-building me-1"></i><span id="detail-empresa"></span>
                                &nbsp;·&nbsp;
                                <i class="bi bi-geo-alt me-1"></i><span id="detail-ubicacion-header"></span>
                            </p>
                        </div>
                        <div class="detail-body">
                            <div id="detail-chips" class="d-flex flex-wrap gap-2 mb-4"></div>

                            <h6 class="fw-bold mb-2" style="color:#1a1d2e;">Descripción del puesto</h6>
                            <p class="text-muted small custom-text-justify" id="detail-descripcion"
                               style="white-space:pre-wrap;"></p>

                            <div class="d-flex justify-content-end mt-3">
                                <button id="btn-postular-empleos"
                                    class="btn btn-warning px-4 fw-semibold rounded-pill"
                                    data-bs-toggle="modal" data-bs-target="#modalPostularEmpleos">
                                    <i class="bi bi-send-fill me-1"></i>Postularme
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Modal Postulación -->
    <div class="modal fade" id="modalPostularEmpleos" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold">Enviar Postulación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="modal-feedback-empleos"></div>
                    <label class="form-label small fw-semibold">Carta de presentación <span class="text-muted fw-normal">(opcional)</span></label>
                    <textarea id="carta-empleos" class="form-control" rows="5"
                        placeholder="Cuéntale al empleador por qué eres el candidato ideal..."></textarea>
                    <button id="btn-enviar-postulacion-empleos"
                        class="btn w-100 fw-semibold rounded-pill py-2 mt-3"
                        style="background:#2e3266;color:#fff;">
                        <i class="bi bi-send-fill me-1"></i>Enviar Postulación
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer-website" class="mt-3"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/app.js"></script>
    <script type="module" src="/js/empleos.js"></script>
    <script src="/js/filter-search.js"></script>
</body>
</html>
