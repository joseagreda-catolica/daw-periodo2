<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>TrabajoSV - Recursos</title>
</head>
<body class="d-flex flex-column min-vh-100 bg-white">

    <nav id="nav-website" class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #2c3e60; min-height: 70px;"></nav>

    <div class="py-5 border-bottom" style="background-color: #ebe8de; border-color: #d6d2c4 !important;">
        <div class="container">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-3 d-flex align-items-center justify-content-center shadow-sm"
                     style="width:50px; height:50px; background-color: #2c3e60;">
                    <i class="bi bi-book-fill text-white fs-4"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-0" style="color: #2c3e60;">Recursos de Aprendizaje</h2>
                    <p class="text-secondary mb-0">Guías, videos y artículos para impulsar tu carrera profesional</p>
                </div>
            </div>
        </div>
    </div>

    <div id="div-root" class="container flex-grow-1 py-5">
        <div id="container-recursos" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border" style="color: #d4b991;" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-3 text-muted">Cargando recursos...</p>
            </div>
        </div>
    </div>

    <footer id="footer-website" class="py-4 border-top" style="background-color: #f3f3f1;">
        </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/app.js"></script>
    <script type="module" src="/js/recursos-page.js"></script>
</body>
</html>
