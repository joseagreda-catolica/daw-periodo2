<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <title>TrabajoSV - Recursos</title>
    <style>
        body { background-color: #f8f9fc; }
        .recursos-hero {
            background: #E8E5D9;
            border-bottom: 1px solid #d6d2c4;
            padding: 36px 0 28px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav id="nav-website" class="navbar navbar-expand-lg"></nav>

    <!-- Hero header -->
    <div class="recursos-hero">
        <div class="container">
            <div class="d-flex align-items-center gap-3 mb-1">
                <div class="rounded-3 d-flex align-items-center justify-content-center"
                     style="width:46px;height:46px;background:#2e3266;">
                    <i class="bi bi-book-fill text-white fs-5"></i>
                </div>
                <div>
                    <h4 class="fw-bold mb-0" style="color:#1a1d2e;">Recursos de Aprendizaje</h4>
                    <p class="text-muted small mb-0">Guías, videos y artículos para impulsar tu carrera profesional</p>
                </div>
            </div>
        </div>
    </div>

    <div id="div-root" class="container flex-grow-1 py-4">
        <div id="container-recursos" class="row g-4">
            <div class="col-12 text-center py-5">
                <p class="text-muted">Cargando recursos...</p>
            </div>
        </div>
    </div>

    <footer id="footer-website"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/app.js"></script>
    <script type="module" src="/js/recursos-page.js"></script>

</html>
