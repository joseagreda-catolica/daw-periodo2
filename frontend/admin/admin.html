<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - TrabajoSV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav class="navbar navbar-expand-lg bg-azul-oscuro">
    <div class="container-fluid px-4">
        <a class="navbar-brand text-white fw-bold" href="/admin/admin.html">TrabajoSV Admin</a>
        <div class="ms-auto d-flex gap-2">
            <span class="text-white-50 small align-self-center" id="admin-nombre">Admin</span>
            <a href="/auth/logout" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
        </div>
    </div>
</nav>

<main class="container py-4 flex-grow-1">

    <h2 class="fw-bold mb-4">Panel Administrativo</h2>

    <!-- Stats -->
    <div class="row g-3 mb-5">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <h3 class="fw-bold" id="stat-usuarios">—</h3>
                    <p class="text-muted mb-0">Usuarios</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <h3 class="fw-bold" id="stat-empresas">—</h3>
                    <p class="text-muted mb-0">Empresas</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <h3 class="fw-bold" id="stat-vacantes">—</h3>
                    <p class="text-muted mb-0">Vacantes</p>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body">
                    <h3 class="fw-bold" id="stat-postulaciones">—</h3>
                    <p class="text-muted mb-0">Postulaciones</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Users table -->
    <h5 class="fw-bold mb-3">Gestión de Usuarios</h5>
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios">
                    <tr><td colspan="5" class="text-center text-muted py-3">Cargando usuarios...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script type="module" src="/js/admin.js"></script>
</body>
</html>
