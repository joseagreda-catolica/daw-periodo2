<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderación - TrabajoSV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fffaef;
            margin: 0;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

         /* CONTENEDOR DEL SIDEBAR (IMPORTANTE) */
        .sidebar {
            width: 240px;
            background-color: #2e3266;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        #sidebar-container {
            width: 240px;
        }

        .sidebar-brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-nav { padding: 12px 12px; flex: 1; }

        .sidebar-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            font-weight: 700;
            padding: 8px 12px 4px;
            text-transform: uppercase;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.65);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }
        .sidebar .nav-link i { font-size: 1.1rem; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.18); }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .main {
            flex: 1;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }


        .content {
            padding: 25px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            margin-right: 8px;
            background: #e5e7eb;
            cursor: pointer;
        }

        .filter-tab.active-tab {
            background: #1e2147;
            color: white;
        }

        .moderacion-item {
            background: white;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .moderacion-content {
            display: flex;
            gap: 12px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .tag-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .tag-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .actions button {
            display: block;
            margin-bottom: 6px;
        }
    </style>
</head>

<body>

<div class="layout">

    
    <div id="sidebar-container"></div>

    <div class="main">

        <div class="topbar">
            <strong>Moderación de contenido</strong>
            <span>Admin</span>
        </div>

        <div class="content">

            <h2 class="page-title">Moderación de contenido</h2>
            <p class="text-muted"><span id="resumen-moderacion">Cargando...</span></p>


            <div class="mb-3">
                <button class="filter-tab active-tab" data-filter="todos">Todos (0)</button>
                <button class="filter-tab" data-filter="valoracion">Valoraciones (0)</button>
                <button class="filter-tab" data-filter="foro" disabled style="opacity:0.5;">Foro (0)</button>
                <button class="filter-tab" data-filter="recurso" disabled style="opacity:0.5;">Recursos (0)</button>
            </div>

            <div class="box mt-3" style="background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.07);overflow:hidden;">
              <table class="table align-middle" style="width:100%;margin-bottom:0;">
                <thead class="table-light">
                  <tr>
                    <th>Empresa</th>
                    <th>Candidato</th>
                    <th>Puntuación</th>
                    <th>Comentario</th>
                    <th class="text-end">Acciones</th>
                  </tr>
                </thead>
                <tbody id="tabla-moderacion">
                  <tr><td colspan="5" class="text-center text-muted py-3">Cargando valoraciones pendientes...</td></tr>
                </tbody>
              </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

    // Actualizar contadores dinámicamente
    function actualizarContadoresMod() {
      const filas = [...document.querySelectorAll('#tabla-moderacion tr')];
      const total = filas.length;
      const valoraciones = filas.length; // Solo valoraciones por ahora

      document.querySelector('[data-filter="todos"]').textContent = `Todos (${total})`;
      document.querySelector('[data-filter="valoracion"]').textContent = `Valoraciones (${valoraciones})`;
      document.getElementById('resumen-moderacion').textContent = `${total} elementos pendientes de revisión`;
    }

    // Filtrado de tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            if (this.disabled) return;
            document.querySelectorAll('.filter-tab').forEach(t => {
                t.classList.remove('active-tab');
            });
            this.classList.add('active-tab');

            // Filtrar tabla (solo valoraciones visible)
            const filter = this.dataset.filter;
            document.querySelectorAll('#tabla-moderacion tr').forEach(tr => {
              if (filter === 'todos' || filter === 'valoracion') {
                tr.style.display = '';
              } else {
                tr.style.display = 'none';
              }
            });
        });
    });

    // Observar cambios en la tabla para actualizar contadores
    const obs = new MutationObserver(actualizarContadoresMod);
    obs.observe(document.getElementById('tabla-moderacion'), { childList: true });

   fetch('/components/sidebar.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                setTimeout(() => {
                    activarSidebar();
                }, 0);
            })
            .catch(err => console.error('Error cargando sidebar:', err));

    function activarSidebar() {
            const currentPath = window.location.pathname.toLowerCase();

            document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                const href = link.getAttribute('href').toLowerCase();

                if (currentPath.endsWith(href)) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
</script>

  <script type="module" src="/js/admin.js"></script>

</body>
</html>
