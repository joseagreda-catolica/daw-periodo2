<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderación - TrabajoSV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fffaef;
            margin: 0;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

         /* CONTENEDOR DEL SIDEBAR (IMPORTANTE) */
        .sidebar {
            width: 240px;
            background-color: #2e3266;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        #sidebar-container {
            width: 240px;
        }

        .sidebar-brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-nav { padding: 12px 12px; flex: 1; }

        .sidebar-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            font-weight: 700;
            padding: 8px 12px 4px;
            text-transform: uppercase;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.65);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }
        .sidebar .nav-link i { font-size: 1.1rem; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.18); }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .main {
            flex: 1;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }


        .content {
            padding: 25px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            margin-right: 8px;
            background: #e5e7eb;
            cursor: pointer;
        }

        .filter-tab.active-tab {
            background: #1e2147;
            color: white;
        }

        .moderacion-item {
            background: white;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .moderacion-content {
            display: flex;
            gap: 12px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .tag-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .tag-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .actions button {
            display: block;
            margin-bottom: 6px;
        }
    </style>
</head>

<body>

<div class="layout">

    
    <div id="sidebar-container"></div>

    <div class="main">

        <div class="topbar">
            <strong>Moderación de contenido</strong>
            <span>Admin</span>
        </div>

        <div class="content">

            <h2 class="page-title">Moderación de contenido</h2>
            <p class="text-muted">7 elementos pendientes de revisión</p>

            
            <div class="mb-3">
                <button class="filter-tab active-tab">Todos (7)</button>
                <button class="filter-tab">Valoraciones (4)</button>
                <button class="filter-tab">Foro (2)</button>
                <button class="filter-tab">Recursos (1)</button>
            </div>

            
            <div class="moderacion-item">
                <div class="moderacion-content">
                    <i class="bi bi-star-fill text-warning fs-4"></i>
                    <div>
                        <strong>Valoración reportada — Banco XYZ</strong>
                        <p class="mb-1">"Esta empresa es un fraude..."</p>
                        <span class="tag tag-danger">Reportada x3</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-dark btn-sm">✔ Aprobar</button>
                    <button class="btn btn-outline-danger btn-sm">Eliminar</button>
                </div>
            </div>

            <div class="moderacion-item">
                <div class="moderacion-content">
                    <i class="bi bi-chat-left-text-fill text-secondary fs-4"></i>
                    <div>
                        <strong>Respuesta en foro — Cómo mejorar tu CV</strong>
                        <p class="mb-1">"Visita mi sitio..."</p>
                        <span class="tag tag-warning">Posible spam</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-dark btn-sm">✔ Aprobar</button>
                    <button class="btn btn-outline-danger btn-sm">Eliminar</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>

    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            document.querySelectorAll('.filter-tab').forEach(t => {
                t.classList.remove('active-tab');
            });
            this.classList.add('active-tab');
        });
    });

   fetch('/backend/public/components/sidebar.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                etTimeout(() => {
                    activarSidebar();
                }, 0);
            })
            .catch(err => console.error('Error cargando sidebar:', err));

    function activarSidebar() {
            const currentPath = window.location.pathname.toLowerCase();

            document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                const href = link.getAttribute('href').toLowerCase();

                if (currentPath.endsWith(href)) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
</script>

</body>
</html>
