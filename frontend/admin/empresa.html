<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empresas - TrabajoSV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f8;
        }

        .layout { display: flex; min-height: 100vh; }

           .sidebar {
            width: 240px;
            background-color: #2e3266;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .main { flex: 1; overflow-x: hidden; }

        /* Sidebar */
        .sidebar-brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-nav { padding: 12px 12px; flex: 1; }
        .sidebar-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            font-weight: 700;
            padding: 8px 12px 4px;
            text-transform: uppercase;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.65);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }
        .sidebar .nav-link i { font-size: 1.1rem; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.18); }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .btn-nuevo {
            background: #c9a84c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .filter-tab {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
        }

        .active-tab {
            background: #1e2147;
            color: white;
        }

        .data-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .data-card-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
        }

        .search-box input {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
        }

        thead {
            background: #f5f1e8;
        }

        th, td {
            padding: 12px 20px;
        }

        .estado-activo {
            background: #dcfce7;
            padding: 4px 10px;
            border-radius: 6px;
            color: green;
        }

        .estado-pendiente {
            background: #fde68a;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .estado-suspendido {
            background: #fee2e2;
            padding: 4px 10px;
            border-radius: 6px;
            color: red;
        }

    </style>
</head>

<body>

<div class="layout">

  
  <div id="sidebar-container"></div>

    <div class="main">

   
        <div class="topbar">
            <strong>Gestión de Empresas</strong>
            <a href="#" class="btn btn-sm btn-outline-danger">Cerrar sesión</a>
        </div>

        <div class="p-4">

           
            <div class="page-header">
                <div>
                    <div class="page-title">Gestión de empresas</div>
                    <small class="text-muted">0 empresas registradas</small>
                </div>

                <button class="btn-nuevo">
                    <i class="bi bi-plus"></i> Nueva empresa
                </button>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active-tab">Todas (0)</button>
                <button class="filter-tab">Activas (0)</button>
                <button class="filter-tab">Pendientes (0)</button>
                <button class="filter-tab">Suspendidas (0)</button>
            </div>

            <div class="data-card">
                <div class="data-card-header">
                    <strong>Lista de empresas</strong>

                    <div class="search-box">
                        <input type="text" placeholder="Buscar empresa...">
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>Sector</th>
                            <th>Vacantes</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="tabla-empresas">
                        <tr>
                            <td colspan="5" class="text-center text-muted">
                                <i class="bi bi-building"></i> No hay empresas registradas
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.filter-tab').forEach(t => {
                t.classList.remove('active-tab');
           
            });
            this.classList.add('active-tab');
        });
    });


    document.querySelector('.search-box input').addEventListener('input', function() {
        const query = this.value.toLowerCase();
        document.querySelectorAll('#tabla-usuarios tr').forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(query) ? '' : 'none';
        });
    });

    fetch('/backend/public/components/sidebar.html')
    .then(res => res.text())
    .then(data => {
        document.getElementById('sidebar-container').innerHTML = data;
        etTimeout(() => {
      activarSidebar();
    }, 0);
    })
    .catch(err => console.error('Error cargando sidebar:', err));

  
    function activarSidebar() {
    const currentPath = window.location.pathname.toLowerCase();

    document.querySelectorAll('.sidebar .nav-link').forEach(link => {
        const href = link.getAttribute('href').toLowerCase();

        if (currentPath.endsWith(href)) {
            link.classList.add('active');
        } else {
            link.classList.remove('active');
        }
    });
}

</script>
</body>
</html>
