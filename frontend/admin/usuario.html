<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - TrabajoSV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f2f8;
            color: #1a1d2e;
        }


        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background-color: #2e3266;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .main {
            flex: 1;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar-brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-nav {
            padding: 12px 12px;
            flex: 1;
        }

        .sidebar-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 700;
            padding: 8px 12px 4px;
            text-transform: uppercase;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.65);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }

        .sidebar .nav-link i {
            font-size: 1.1rem;
        }

        .sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.18);
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-logo {
            font-size: 1.25rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .brand-logo span {
            color: #f59e0b;
        }

        .brand-sub {
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            margin-top: 2px;
        }



        .main {
            flex: 1;
            overflow-x: hidden;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }


        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .page-title {
            font-size: 1.65rem;
            font-weight: 800;
            color: #1a1d2e;
            line-height: 1.1;
        }

        .page-sub {
            font-size: 0.82rem;
            color: #6b7280;
            margin-top: 4px;
        }

        .btn-nuevo {
            background: #c9a84c;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .btn-nuevo:hover {
            background: #b8943d;
        }


        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }

        .filter-tab.active-tab {
            background: #1e2147;
            color: #fff;
        }

        .filter-tab.tab-candidatos {
            background: #e8e4d9;
            color: #5a4e2f;
        }

        .filter-tab.tab-candidatos:hover {
            background: #d9d3c3;
        }

        .filter-tab.tab-empresas {
            background: #e8e4d9;
            color: #5a4e2f;
        }

        .filter-tab.tab-empresas:hover {
            background: #d9d3c3;
        }

        .filter-tab.tab-admins {
            background: #e8e4d9;
            color: #5a4e2f;
        }

        .filter-tab.tab-admins:hover {
            background: #d9d3c3;
        }

        .filter-tab.tab-suspendidos {
            background: #fee2e2;
            color: #b91c1c;
        }

        .filter-tab.tab-suspendidos:hover {
            background: #fecaca;
        }


        .data-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
            overflow: hidden;
        }

        .data-card-header {
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .data-card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1a1d2e;
        }


        .search-box {
            position: relative;
        }

        .search-box input {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 8px 14px 8px 36px;
            font-size: 0.82rem;
            color: #6b7280;
            outline: none;
            width: 220px;
            background: #f9fafb;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .search-box input:focus {
            border-color: #1e2147;
            background: #fff;
        }

        .search-box i {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 0.85rem;
        }


        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table thead th {
            background: #f5f1e8;
            color: #6b7280;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 12px 24px;
            border: none;
            text-align: left;
        }

        .users-table thead th:last-child {
            text-align: right;
        }

        .users-table tbody td {
            padding: 14px 24px;
            border-bottom: 1px solid #f3f4f6;
            vertical-align: middle;
        }

        .users-table tbody tr:last-child td {
            border-bottom: none;
        }

        .users-table tbody tr:hover {
            background: #fafafa;
        }


        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e3266, #4a51b5);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 0.88rem;
            font-weight: 700;
            color: #1a1d2e;
        }

        .user-email {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .badge-rol {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 11px;
            border-radius: 6px;
        }

        .rol-candidato {
            background: #e8e4d9;
            color: #5a4e2f;
        }

        .rol-empresa {
            background: #1e2147;
            color: #fff;
        }

        .rol-admin {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-estado {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
        }

        .estado-activo {
            background: #dcfce7;
            color: #15803d;
        }

        .estado-suspendido {
            background: #fee2e2;
            color: #b91c1c;
        }


        .action-icons {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.85rem;
        }

        .btn-icon:hover {
            border-color: #1e2147;
            background: #f0f2f8;
        }

        .btn-icon.view-btn {
            color: #6b7280;
        }

        .btn-icon.edit-btn {
            color: #f59e0b;
            border-color: #fde68a;
            background: #fffbeb;
        }

        .btn-icon.edit-btn:hover {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        .btn-icon.lock-btn {
            color: #ef4444;
            border-color: #fecaca;
            background: #fff5f5;
        }

        .btn-icon.lock-btn:hover {
            background: #fee2e2;
            border-color: #ef4444;
        }


        .date-cell {
            font-size: 0.82rem;
            color: #6b7280;
        }

        @media (max-width: 767px) {

            .page-title {
                font-size: 1.2rem;
            }

            .filter-tabs {
                gap: 5px;
            }

            .filter-tab {
                font-size: 0.72rem;
                padding: 6px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="layout">

        <div id="sidebar-container"></div>


        <div class="main">

            <div class="topbar">
                <div>
                    <span class="fw-bold" style="color:#1a1d2e;font-size:0.9rem;">Gestión de Usuarios</span>
                </div>
                <a href="#" class="btn btn-sm btn-outline-danger rounded-pill px-3" style="font-size:0.8rem;">
                    <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
                </a>
            </div>


            <div class="p-4">


                <div class="page-header">
                    <div>
                        <div class="page-title">Gestión de usuarios</div>

                    </div>
                    <button class="btn-nuevo">
                        <i class="bi bi-plus-lg"></i> Nuevo usuario
                    </button>
                </div>


                <button id="btnTodos" class="filter-tab active-tab">Todos</button>
                <button id="btnCandidatos" class="filter-tab tab-candidatos">Candidatos</button>
                <button id="btnEmpresas" class="filter-tab tab-empresas">Empresas</button>
                <button id="btnAdmins" class="filter-tab tab-admins">Admins</button>
                <button id="btnSuspendidos" class="filter-tab tab-suspendidos">Suspendidos</button>


                <div class="data-card">
                    <div class="data-card-header">
                        <div class="data-card-title">Lista de usuarios</div>
                        <div class="search-box">
                            <i class="bi bi-search"></i>
                            <input type="text" placeholder="Buscar usuario...">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="users-table">
                            <thead>
                                <tr>
                                    <th>Usuario</th>
                                    <th>Rol</th>
                                    <th>Registro</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-usuarios">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">
                                        <i class="bi bi-arrow-repeat me-1"></i>Cargando usuarios...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>


            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.filter-tab').forEach(t => {
                    t.classList.remove('active-tab');

                });
                this.classList.add('active-tab');
            });
        });


        document.querySelector('.search-box input').addEventListener('input', function () {
            const query = this.value.toLowerCase();
            document.querySelectorAll('#tabla-usuarios tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        });

        fetch('/backend/public/components/sidebar.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('sidebar-container').innerHTML = data;
                etTimeout(() => {
                    activarSidebar();
                }, 0);
            })
            .catch(err => console.error('Error cargando sidebar:', err));


        function activarSidebar() {
            const currentPath = window.location.pathname.toLowerCase();

            document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                const href = link.getAttribute('href').toLowerCase();

                if (currentPath.endsWith(href)) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
    </script>

</body>

</html>
