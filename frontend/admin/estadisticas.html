<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas - TrabajoSV</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

       body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fffaef;
            margin: 0;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

         /* CONTENEDOR DEL SIDEBAR (IMPORTANTE) */
        .sidebar {
            width: 240px;
            background-color: #2e3266;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        #sidebar-container {
            width: 240px;
        }

        .sidebar-brand {
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-nav { padding: 12px 12px; flex: 1; }

        .sidebar-label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            font-weight: 700;
            padding: 8px 12px 4px;
            text-transform: uppercase;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.65);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }
        .sidebar .nav-link i { font-size: 1.1rem; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.18); }
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .main {
            flex: 1;
        }

        /* TOPBAR */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
        }

        /* CONTENT */
        .content {
            padding: 25px;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
        }

        /* CARDS */
        .stat-card {
            background: #e8e1d3;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.5rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #6b7280;
        }

        /* BOXES */
        .box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        /* BARS */
        .bar {
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #2e3266;
        }

        .bar-gold {
            background: #c9a84c;
        }
    </style>
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN -->
        <div class="main">

            <!-- TOPBAR -->
            <div class="topbar">
                <div class="fw-bold">Estadísticas</div>
                <button class="btn btn-outline-danger btn-sm">Cerrar sesión</button>
            </div>

            <div class="content">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <div class="page-title">Estadísticas del sistema</div>
                        <small class="text-muted">Datos de desempeño — Marzo 2026</small>
                    </div>
                    <div>
                        <select class="form-select d-inline w-auto">
                            <option>Últimos 30 días</option>
                        </select>
                        <button class="btn btn-warning">Exportar CSV</button>
                    </div>
                </div>

                <!-- STATS -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-value">42%</div>
                            <div class="stat-label">Tasa de conversión</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-value">4.2 min</div>
                            <div class="stat-label">Tiempo prom. sesión</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-value">68%</div>
                            <div class="stat-label">Usuarios recurrentes</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-value">22 días</div>
                            <div class="stat-label">Prom. cobertura vacante</div>
                        </div>
                    </div>
                </div>

                <!-- GRÁFICOS -->
                <div class="row">

                    <!-- BARRAS -->
                    <div class="col-md-6">
                        <div class="box">
                            <h6>Postulaciones por sector</h6>
                            <div class="d-flex align-items-end gap-3 mt-3" style="height:150px;">
                                <div style="width:40px;height:120px;background:#2e3266;"></div>
                                <div style="width:40px;height:90px;background:#c9a84c;"></div>
                                <div style="width:40px;height:70px;background:#ddd;"></div>
                                <div style="width:40px;height:60px;background:#ddd;"></div>
                                <div style="width:40px;height:50px;background:#ddd;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- LISTA -->
                    <div class="col-md-6">
                        <div class="box">
                            <h6>Top sectores — Vacantes</h6>

                            <div class="mt-3">
                                Tecnología 420
                                <div class="bar">
                                    <div class="bar-fill" style="width:100%"></div>
                                </div>
                            </div>

                            <div class="mt-3">
                                Finanzas 310
                                <div class="bar">
                                    <div class="bar-fill bar-gold" style="width:75%"></div>
                                </div>
                            </div>

                            <div class="mt-3">
                                Salud 280
                                <div class="bar">
                                    <div class="bar-fill bar-gold" style="width:65%"></div>
                                </div>
                            </div>

                            <div class="mt-3">
                                Logística 195
                                <div class="bar">
                                    <div class="bar-fill" style="width:45%"></div>
                                </div>
                            </div>

                            <div class="mt-3">
                                Marketing 175
                                <div class="bar">
                                    <div class="bar-fill" style="width:40%"></div>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            fetch('/backend/public/components/sidebar.html')
                .then(res => res.text())
                .then(data => {
                    document.getElementById('sidebar-container').innerHTML = data;

                    // ✅ CORREGIDO
                    setTimeout(() => {
                        activarSidebar();
                    }, 0);
                })
                .catch(err => console.error('Error cargando sidebar:', err));

            function activarSidebar() {
                const currentPath = window.location.pathname.toLowerCase();

                document.querySelectorAll('.sidebar .nav-link').forEach(link => {
                    const href = link.getAttribute('href');
                    if (!href) return;

                    if (currentPath.includes(href.toLowerCase())) {
                        link.classList.add('active');
                    }
                });
            }

        });
    </script>

</body>

</html>
